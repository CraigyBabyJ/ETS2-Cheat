name: Build ETS2 Cheat

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release --self-contained false -p:UseAppHost=true -p:DebugType=None -p:DebugSymbols=false -o publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETS2-Cheat-win-x64
          path: publish/**
